<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Real-Time Face Detection</title>

    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="container">

        <div class="header">
            <h1>Real-Time Face Detection</h1>
            <div class="controls">
    <button id="start-btn">Start Camera</button>
    <button id="stop-btn">Stop Camera</button>
</div>

            <div class="status-bar">
                <span id="ws-status" class="badge disconnected">
                    Disconnected
                </span>

                <span id="face-status" class="badge noface">
                    No Face
                </span>
            </div>
        </div>

        <div class="video-section">

            <video
                id="video"
                autoplay
                playsinline
                muted
            ></video>

            <img id="output" alt="Processed Stream" />

            <canvas id="canvas"></canvas>

        </div>

        <div class="info-panel">

            <div class="card">
                <h3>Detection Info</h3>

                <p><strong>Confidence:</strong> <span id="confidence">0</span></p>
                <p><strong>Frame:</strong> <span id="frame-number">0</span></p>
            </div>

            <div class="card">
                <h3>ROI Coordinates</h3>

                <p>X: <span id="roi-x">0</span></p>
                <p>Y: <span id="roi-y">0</span></p>
                <p>Width: <span id="roi-width">0</span></p>
                <p>Height: <span id="roi-height">0</span></p>
            </div>

        </div>

    </div>

    <script src="app.js"></script>

</body>
</html>
